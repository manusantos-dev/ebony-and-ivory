name: 🤖 Inspector CI
on:
  push: { branches: ["main"] }
  pull_request: { branches: ["main"] }

jobs:
  audit-and-build:
    name: Audit & Build
    runs-on: ubuntu-latest
    steps:
      # INIT: Repository checkout & environment setup
      - name: 📥 Checkout Repo
        uses: actions/checkout@v4
      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm' }
      - name: 📦 Install Dependencies
        run: npm install

      # AUDIT: Formatting & static logic analysis
      - name: 🎨 Prettier Format Check
        run: npx prettier --check "src/**/*.{js,css,html}"
      - name: 🕵️ ESLint Logic Audit
        run: npx eslint src/js/

      # BUILD: Production bundling & PWA chunk verification
      - name: 🏗️ Vite Production Build
        run: npm run build
